<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>予約完了</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f7f7f7;
      color: #222;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.5;
    }

    .box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 12px;
      background: #eef7ee;
      line-height: 1.9;
      font-size: 15px;
    }

    .note {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      background: #f0f6ff;
      line-height: 1.8;
      color: #333;
    }

    .link-area {
      margin-top: 10px;
    }

    .manage-link {
      display: inline-block;
      margin-top: 8px;
      color: #1a73e8;
      text-decoration: none;
      font-weight: bold;
    }

    .manage-link:hover {
      text-decoration: underline;
    }

    .small {
      margin-top: 12px;
      font-size: 13px;
      color: #666;
      line-height: 1.7;
    }

    a {
      word-break: break-all;
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 16px;
      }

      .card {
        padding: 20px;
      }

      h1 {
        font-size: 24px;
      }

      .box,
      .note {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="wrap">

    <div class="card">

      <h1>予約が完了しました</h1>

      <div class="box" id="completeBox"></div>

      <div class="note">
        この画面が表示されていれば予約は完了しています。<br>
        同じ内容で再度予約しないようお願いいたします。
      </div>

    </div>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const bookingDate = params.get("bookingDate") || "";
    const bookingStartTime = params.get("bookingStartTime") || "";
    const bookingEndTime = params.get("bookingEndTime") || "";
    const fullName = params.get("fullName") || "";
    const managementUrl = params.get("managementUrl") || "";

    const completeBox = document.getElementById("completeBox");

    completeBox.innerHTML = `
      <div>
        <strong>予約日:</strong> ${escapeHtml(bookingDate)}
      </div>

      <div>
        <strong>開始時刻:</strong> ${escapeHtml(bookingStartTime)}
      </div>

      <div>
        <strong>終了時刻:</strong> ${escapeHtml(bookingEndTime)}
      </div>

      <div>
        <strong>お名前:</strong> ${escapeHtml(fullName)}
      </div>

      ${
        managementUrl
          ? `
            <div class="link-area">
              <strong>管理URL:</strong><br>
              <a
                class="manage-link"
                href="${escapeAttribute(managementUrl)}"
                target="_blank"
                rel="noopener noreferrer"
              >
                予約管理ページを開く
              </a>
            </div>
          `
          : ''
      }

      <div class="small">
        ※予約変更・キャンセルが必要な場合は管理ページから操作してください。
      </div>
    `;

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttribute(value) {
      return String(value || '')
        .replace(/"/g, '&quot;');
    }
  </script>

</body>
</html>
